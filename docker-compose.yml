version: '3'
services:
  jenkins:
    image: choijaehun/jenkins:latest
    container_name: jenkins
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "18080:8080"
      - "50000:50000"
    environment:
      TZ: "Asia/Seoul"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - ci-network

  ansible:
    image: choijaehun/ansible:latest
    container_name: ansible
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      - ./ansible_playbooks:/etc/ansible/playbooks
    environment:
      TZ: "Asia/Seoul"
    networks:
      - ci-network

networks:
  ci-network:
    driver: bridge

volumes:
  jenkins_home:
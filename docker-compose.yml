version: '3'
services:
  jenkins:
    image: choijaehun/jenkins:latest
    container_name: jenkins_server
    privileged: true
    stdin_open: true
    tty: true
    restart: always
    ports:
      - "18080:8080"
      - "50000:50000"
    environment:
      TZ: "Asia/Seoul"
    networks:
      - ci-network

  ansible:
    image: choijaehun/ansible:latest
    container_name: ansible-server
    privileged: true
    stdin_open: true
    tty: true
    restart: always
    ports:
      - "10022:22"
    environment:
      TZ: "Asia/Seoul"
    networks:
      - ci-network
networks:
  ci-network:
    driver: bridge

volumes:
  jenkins_home:

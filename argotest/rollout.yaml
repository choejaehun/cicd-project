apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: 
  name: nginx-rollout
spec:
  replicas: 5
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 15}
      - setWeight: 40
      - pause: {duration: 15}
      - setWeight: 60
      - pause: {duration: 15}
      - setWeight: 80
      - pause: {duration: 15}
      - setWeight: 100
      - pause: {duration: 15}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: nginx-rollout
  template:
    metadata:
      labels:
        app: nginx-rollout
    spec:
      containers:
      - name: nginx
        image: argoproj/rollouts-demo:red
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: 32Mi
            cpu: 5m
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-rollout
  namespace: default
spec:
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.19.0 # Canary 배포할 새로운 버전
          ports:
            - containerPort: 80
  strategy:
    canary:
      steps:
        - setWeight: 25 # 처음에 25% 트래픽을 새 버전으로
        - pause: { duration: 30s } # 30초 동안 상태 관찰
        - setWeight: 50 # 50% 트래픽을 새 버전으로
        - pause: { duration: 30s } # 30초 동안 상태 관찰
        - setWeight: 100 # 100% 트래픽을 새 버전으로

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cicd_project  # 'localhost' 대신 MySQL의 실제 호스트명이나 서비스 이름
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update  # 개발 중이라면 'create'로 유지할 수 있지만, 실제 운영 환경에서는 'update'나 'validate'를 사용
      show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  sql:
    init:
      mode: always  # 스키마 초기화가 필요한 경우 항상 실행되도록 설정
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2MB
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080  # 서버 포트, 필요에 따라 수정 가능
